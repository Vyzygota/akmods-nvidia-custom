name: akmods-nvidia-custom Builder

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # Codziennie w nocy o 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix-spider:
    name: Cyber-PajńÖk Zwiadowca
    runs-on: ubuntu-latest
    outputs:
      fedora: ${{ steps.scrape.outputs.fedora }}
      nvidia: ${{ steps.scrape.outputs.nvidia }}
      linux: ${{ steps.scrape.outputs.linux }}
    steps:
      - name: Wykrywanie Najnowszych Wersji
        id: scrape
        run: |
          # 1. Dynamiczne scrapowanie najnowszej stabilnej wersji Fedory
          FEDORA_VER=$(curl -sL https://dl.fedoraproject.org/pub/fedora/linux/releases/ | grep -oE 'href="[0-9]+/"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
          
          # 2. Scrapowanie Oficjalnego endpointu najnowszej NVIDII (.run)
          NVIDIA_VER=$(curl -sL https://download.nvidia.com/XFree86/Linux-x86_64/latest.txt | awk '{print $1}')

          # 3. Dynamiczne pobieranie absolutnie najnowszej wersji jńÖdra Linux (Mainline/Stable)
          LINUX_VER=$(curl -sL https://www.kernel.org/releases.json | jq -r '.releases[0].version')
          
          echo "ZnalazŇāem: Fedora=$FEDORA_VER, NVIDIA=$NVIDIA_VER, LINUX=$LINUX_VER"
          echo "fedora=$FEDORA_VER" >> "$GITHUB_OUTPUT"
          echo "nvidia=$NVIDIA_VER" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX_VER" >> "$GITHUB_OUTPUT"

  build:
    name: Fabryka "All Latest"
    needs: matrix-spider
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4
      
      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Budowanie i Wypychanie Obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/vyzygota/akmods-nvidia-custom:latest
          build-args: |
            FEDORA_VERSION=${{ needs.matrix-spider.outputs.fedora }}
            NVIDIA_VERSION=${{ needs.matrix-spider.outputs.nvidia }}
            LINUX_VERSION=${{ needs.matrix-spider.outputs.linux }}

      - name: Powiadom o poŇľarze w fabryce "All Latest"
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
            -d "{\"content\": \"ūüö® **ALARM!** Cyber-PajńÖk melduje: Kompilacja All Latest (Kernel ${{ needs.matrix-spider.outputs.linux }} + NVIDIA ${{ needs.matrix-spider.outputs.nvidia }}) wŇāaŇõnie eksplodowaŇāa! Pancerz ochronny nie wytrzymaŇā. Wymagana interwencja tw√≥rcy!\"}" \
            $DISCORD_WEBHOOK
          else
            echo "Kompilacja zakoŇĄczona bŇāńôdem, ale brak skonfigurowanego webhooka w zakŇāadce Secrets."
          fi
