name: akmods-nvidia-custom Builder

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # Codziennie w nocy o 03:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'WymuŇõ build nawet bez zmian wersji'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  matrix-spider:
    name: Cyber-PajńÖk Zwiadowca
    runs-on: ubuntu-latest
    outputs:
      fedora: ${{ steps.scrape.outputs.fedora }}
      nvidia: ${{ steps.scrape.outputs.nvidia }}
      linux: ${{ steps.scrape.outputs.linux }}
      changed: ${{ steps.compare.outputs.changed }}
      linux_available: ${{ steps.scrape.outputs.linux_available }}
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Wykrywanie Najnowszych Wersji
        id: scrape
        run: |
          # 1. Dynamiczne scrapowanie najnowszej stabilnej wersji Fedory
          FEDORA_VER=$(curl -sL https://dl.fedoraproject.org/pub/fedora/linux/releases/ | grep -oE 'href="[0-9]+/"' | grep -oE '[0-9]+' | sort -rn | head -n 1)

          # 2. Scrapowanie Oficjalnego endpointu najnowszej NVIDII (.run)
          NVIDIA_VER=$(curl -sL https://download.nvidia.com/XFree86/Linux-x86_64/latest.txt | awk '{print $1}')

          # 3. Najnowszy stable kernel dostńôpny dla aktualnej Fedory (z COPR kernel-vanilla/fedora)
          # kernel.org podaje latest_stable, ale COPR stable-fedora-releases buduje z ~1-3 tygodniowym op√≥Ňļnieniem.
          # Pytamy COPR co faktycznie jest zbudowane dla fc${FEDORA_VER}.
          LINUX_VER_LATEST=$(curl -sL https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          LINUX_VER_COPR=$(curl -s "https://copr.fedorainfracloud.org/api_3/build/list?ownername=@kernel-vanilla&projectname=fedora&status=succeeded&limit=30" \
            | jq -r --arg fc "fedora-${FEDORA_VER}-x86_64" \
            '[.items[] | select(.source_package.name=="stable-fedora-releases") | select(.chroots[] | contains($fc))] | first | .source_package.version | split("-")[0]' \
            2>/dev/null | grep -v null || true)
          LINUX_VER="${LINUX_VER_COPR:-$LINUX_VER_LATEST}"
          echo "kernel.org latest: $LINUX_VER_LATEST | COPR f${FEDORA_VER}: ${LINUX_VER_COPR:-nie znaleziono} | uŇľywam: $LINUX_VER"

          echo "ZnalazŇāem: Fedora=$FEDORA_VER, NVIDIA=$NVIDIA_VER, LINUX=$LINUX_VER"
          echo "fedora=$FEDORA_VER" >> "$GITHUB_OUTPUT"
          echo "nvidia=$NVIDIA_VER" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX_VER" >> "$GITHUB_OUTPUT"
          echo "linux_available=${LINUX_VER_COPR:-nie}" >> "$GITHUB_OUTPUT"

      - name: SprawdŇļ czy wersje sińô zmieniŇāy
        id: compare
        run: |
          NEW="fedora=${{ steps.scrape.outputs.fedora }} nvidia=${{ steps.scrape.outputs.nvidia }} linux=${{ steps.scrape.outputs.linux }}"
          OLD=$(cat versions.lock 2>/dev/null || echo "")
          if [ "$OLD" = "$NEW" ]; then
            echo "Brak zmian wersji ‚ÄĒ pomijam build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Wykryto zmiany: $OLD ‚Üí $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Fabryka "All Latest"
    needs: matrix-spider
    if: needs.matrix-spider.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4
      
      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Budowanie i Wypychanie Obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/vyzygota/akmods-nvidia-custom:latest
          build-args: |
            FEDORA_VERSION=${{ needs.matrix-spider.outputs.fedora }}
            NVIDIA_VERSION=${{ needs.matrix-spider.outputs.nvidia }}
            LINUX_VERSION=${{ needs.matrix-spider.outputs.linux }}

      - name: Zaktualizuj versions.lock
        if: success()
        run: |
          echo "fedora=${{ needs.matrix-spider.outputs.fedora }} nvidia=${{ needs.matrix-spider.outputs.nvidia }} linux=${{ needs.matrix-spider.outputs.linux }}" > versions.lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.lock
          git commit -m "chore: update versions.lock [skip ci]"
          git push

      - name: Uruchom BleedingEdgeBazzite
        if: success()
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.BEB_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Vyzygota/BleedingEdgeBazzite/dispatches \
            -d "{\"event_type\":\"akmods_updated\",\"client_payload\":{\"fedora_version\":\"${{ needs.matrix-spider.outputs.fedora }}\"}}"

      - name: Powiadom o poŇľarze w fabryce "All Latest"
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
            -d "{\"content\": \"ūüö® **ALARM!** Cyber-PajńÖk melduje: Kompilacja All Latest (Kernel ${{ needs.matrix-spider.outputs.linux }} + NVIDIA ${{ needs.matrix-spider.outputs.nvidia }}) wŇāaŇõnie eksplodowaŇāa! Pancerz ochronny nie wytrzymaŇā. Wymagana interwencja tw√≥rcy!\"}" \
            $DISCORD_WEBHOOK
          else
            echo "Kompilacja zakoŇĄczona bŇāńôdem, ale brak skonfigurowanego webhooka w zakŇāadce Secrets."
          fi
