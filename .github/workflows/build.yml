name: akmods-nvidia-custom Builder
on:
  schedule:
    - cron: "0 3 * * *" # Codziennie w nocy nasz system budzi się by znaleźć nowości
  workflow_dispatch:

jobs:
  matrix-spider:
    name: Cyber-Pająk Zwiadowca
    runs-on: ubuntu-latest
    outputs:
      fedora: ${{ steps.scrape.outputs.fedora }}
      nvidia: ${{ steps.scrape.outputs.nvidia }}
    steps:
      - name: Wykrywanie Najnowszych Wersji 
        id: scrape
        run: |
          # 1. Scrapowanie najnowszego obrazu Fedory z Github API
          FEDORA_VER=$(curl -sL "https://api.github.com/repos/fedora-cloud/docker-brew-fedora/tags" | jq -r '.[0].name')
          
          # 2. Scrapowanie Oficjalnego endpointu najnowszej NVIDII (.run)
          NVIDIA_VER=$(curl -sL https://download.nvidia.com/XFree86/Linux-x86_64/latest.txt | awk '{print $1}')
          
          echo "Znalazłem: Fedora=$FEDORA_VER, NVIDIA=$NVIDIA_VER"
          echo "fedora=$FEDORA_VER" >> "$GITHUB_OUTPUT"
          echo "nvidia=$NVIDIA_VER" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix-spider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/akmods-nvidia-custom:latest
          build-args: |
            FEDORA_VERSION=${{ needs.matrix-spider.outputs.fedora }}
            NVIDIA_VERSION=${{ needs.matrix-spider.outputs.nvidia }}
