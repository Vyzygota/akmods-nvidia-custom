name: akmods-nvidia-custom Builder

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # Codziennie w nocy o 03:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'WymuŇõ build nawet bez zmian wersji'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  matrix-spider:
    name: Cyber-PajńÖk Zwiadowca
    runs-on: ubuntu-latest
    outputs:
      fedora: ${{ steps.scrape.outputs.fedora }}
      nvidia: ${{ steps.scrape.outputs.nvidia }}
      linux: ${{ steps.scrape.outputs.linux }}
      changed: ${{ steps.compare.outputs.changed }}
      linux_available: ${{ steps.scrape.outputs.linux_available }}
      bazzite: ${{ steps.scrape.outputs.bazzite }}
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v6

      - name: Wykrywanie Najnowszych Wersji
        id: scrape
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Dynamiczne scrapowanie najnowszej stabilnej wersji Fedory
          FEDORA_VER=$(curl -sL https://dl.fedoraproject.org/pub/fedora/linux/releases/ \
            | grep -oE 'href="[0-9]+/"' | grep -oE '[0-9]+' | sort -rn | head -n 1)

          # 2. NVIDIA ‚ÄĒ jedyne Ňļr√≥dŇāo prawdy: Bazzite base image
          # Bazzite Ňõledzi NVIDIA Open i adopuje w ~10 dni od wydania.
          # Nie sprawdzamy nvidia.com ani GitHub NVIDIA ‚ÄĒ te majńÖ r√≥wnolegŇāe gaŇāńôzie
          # (595.x i 610.x) i nie wiadomo kt√≥rńÖ Bazzite bńôdzie Ňõledzińá.
          # Zamiast tego: czytamy etykietńô obrazu Bazzite, pobieramy release notes,
          # wycińÖgamy "Nvidia Open" ‚Üí zawsze 100% zgodnoŇõńá kmod‚ÜĒuserspace.

          echo "--- Wykrywanie wersji NVIDIA z Bazzite base image ---"

          # Pobierz etykietńô wersji obrazu przez GHCR API (bez skopeo, bez logowania)
          BAZZITE_TOKEN=$(curl -sf \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:ublue-os/bazzite-deck-nvidia:pull" \
            | jq -r '.token')

          # Pobierz manifest (obsŇāuga manifest list / multi-arch)
          MANIFEST=$(curl -sf \
            -H "Authorization: Bearer $BAZZITE_TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/ublue-os/bazzite-deck-nvidia/manifests/unstable-${FEDORA_VER}")

          # JeŇõli to manifest list (multi-arch), weŇļ digest dla amd64
          if echo "$MANIFEST" | jq -e '.manifests' > /dev/null 2>&1; then
            AMD64_DIGEST=$(echo "$MANIFEST" | jq -r \
              '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
              | head -1)
            MANIFEST=$(curl -sf \
              -H "Authorization: Bearer $BAZZITE_TOKEN" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              "https://ghcr.io/v2/ublue-os/bazzite-deck-nvidia/manifests/$AMD64_DIGEST")
          fi

          CONFIG_DIGEST=$(echo "$MANIFEST" | jq -r '.config.digest')
          BAZZITE_IMG_LABEL=$(curl -sf \
            -H "Authorization: Bearer $BAZZITE_TOKEN" \
            "https://ghcr.io/v2/ublue-os/bazzite-deck-nvidia/blobs/$CONFIG_DIGEST" \
            | jq -r '.config.Labels["org.opencontainers.image.version"]')

          # "unstable-44.20260605" ‚Üí "44.20260605"
          BAZZITE_VER="${BAZZITE_IMG_LABEL#unstable-}"
          echo "Bazzite base image: $BAZZITE_IMG_LABEL (release tag: $BAZZITE_VER)"

          # Pobierz wersjńô NVIDIA Open z release notes Bazzite
          NVIDIA_VER=$(gh release view "${BAZZITE_VER}" --repo ublue-os/bazzite --json body \
            -q '.body' 2>/dev/null \
            | grep "Nvidia Open" | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)

          if [ -z "$NVIDIA_VER" ]; then
            echo "Brak release Bazzite dla '${BAZZITE_VER}' ‚ÄĒ szukam w najnowszym stable release..."
            LATEST_STABLE_TAG=$(gh release list --repo ublue-os/bazzite --limit 10 \
              | grep -v "Pre-release\|testing" | grep "${FEDORA_VER}\." | head -1 | awk '{print $3}')
            NVIDIA_VER=$(gh release view "${LATEST_STABLE_TAG}" --repo ublue-os/bazzite --json body \
              -q '.body' 2>/dev/null \
              | grep "Nvidia Open" | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
            echo "Fallback do ${LATEST_STABLE_TAG} ‚Üí NVIDIA ${NVIDIA_VER}"
          fi

          if [ -z "$NVIDIA_VER" ]; then
            echo "KRYTYCZNY BŇĀńĄD: Nie udaŇāo sińô pobrańá wersji NVIDIA z Bazzite releases!"
            exit 1
          fi

          echo "NVIDIA (z Bazzite): $NVIDIA_VER"

          # 3. Najnowszy stable kernel dostńôpny dla aktualnej Fedory (z COPR kernel-vanilla/fedora)
          # kernel.org podaje latest_stable, ale COPR stable-fedora-releases buduje z ~1-3 tygodniowym op√≥Ňļnieniem.
          # Pytamy COPR co faktycznie jest zbudowane dla fc${FEDORA_VER}.
          LINUX_VER_LATEST=$(curl -sL https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          LINUX_VER_COPR=$(curl -s "https://copr.fedorainfracloud.org/api_3/build/list?ownername=@kernel-vanilla&projectname=fedora&status=succeeded&limit=30" \
            | jq -r --arg fc "fedora-${FEDORA_VER}-x86_64" \
            '[.items[] | select(.source_package.name=="stable-fedora-releases") | select(.chroots[] | contains($fc))] | first | .source_package.version | split("-")[0]' \
            2>/dev/null | grep -v null || true)
          LINUX_VER="${LINUX_VER_COPR:-$LINUX_VER_LATEST}"
          echo "kernel.org latest: $LINUX_VER_LATEST | COPR f${FEDORA_VER}: ${LINUX_VER_COPR:-nie znaleziono} | uŇľywam: $LINUX_VER"

          echo "ZnalazŇāem: Fedora=$FEDORA_VER, NVIDIA=$NVIDIA_VER, LINUX=$LINUX_VER, Bazzite=$BAZZITE_VER"
          echo "fedora=$FEDORA_VER"    >> "$GITHUB_OUTPUT"
          echo "nvidia=$NVIDIA_VER"   >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX_VER"     >> "$GITHUB_OUTPUT"
          echo "linux_available=${LINUX_VER_COPR:-nie}" >> "$GITHUB_OUTPUT"
          echo "bazzite=$BAZZITE_VER" >> "$GITHUB_OUTPUT"

      - name: SprawdŇļ czy wersje sińô zmieniŇāy
        id: compare
        run: |
          NEW="fedora=${{ steps.scrape.outputs.fedora }} nvidia=${{ steps.scrape.outputs.nvidia }} linux=${{ steps.scrape.outputs.linux }} bazzite=${{ steps.scrape.outputs.bazzite }}"
          OLD=$(cat versions.lock 2>/dev/null || echo "")
          if [ "$OLD" = "$NEW" ]; then
            echo "Brak zmian wersji ‚ÄĒ pomijam build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Wykryto zmiany: $OLD ‚Üí $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Fabryka "All Latest"
    needs: matrix-spider
    if: needs.matrix-spider.outputs.changed == 'true' || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v6

      - name: Logowanie do GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Budowanie i Wypychanie Obrazu
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/vyzygota/akmods-nvidia-custom:latest
          build-args: |
            FEDORA_VERSION=${{ needs.matrix-spider.outputs.fedora }}
            NVIDIA_VERSION=${{ needs.matrix-spider.outputs.nvidia }}
            LINUX_VERSION=${{ needs.matrix-spider.outputs.linux }}

      - name: Zaktualizuj versions.lock
        if: success()
        run: |
          echo "fedora=${{ needs.matrix-spider.outputs.fedora }} nvidia=${{ needs.matrix-spider.outputs.nvidia }} linux=${{ needs.matrix-spider.outputs.linux }} bazzite=${{ needs.matrix-spider.outputs.bazzite }}" > versions.lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.lock
          git commit -m "chore: update versions.lock [skip ci]"
          git push

      - name: Uruchom BleedingEdgeBazzite
        if: success()
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.BEB_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Vyzygota/BleedingEdgeBazzite/dispatches \
            -d "{\"event_type\":\"akmods_updated\",\"client_payload\":{\"fedora_version\":\"${{ needs.matrix-spider.outputs.fedora }}\"}}")
          if [ "$HTTP_STATUS" = "204" ]; then
            echo "‚úÖ BEB dispatch wysŇāany pomyŇõlnie."
          else
            echo "‚ĚĆ BEB dispatch nie powi√≥dŇā sińô ‚ÄĒ HTTP $HTTP_STATUS. SprawdŇļ secret BEB_DISPATCH_TOKEN."
            exit 1
          fi

      - name: Powiadom o poŇľarze w fabryce "All Latest"
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
            -d "{\"content\": \"ūüö® **ALARM!** Cyber-PajńÖk melduje: Kompilacja All Latest (Kernel ${{ needs.matrix-spider.outputs.linux }} + NVIDIA ${{ needs.matrix-spider.outputs.nvidia }}) wŇāaŇõnie eksplodowaŇāa! Pancerz ochronny nie wytrzymaŇā. Wymagana interwencja tw√≥rcy!\"}" \
            $DISCORD_WEBHOOK
          else
            echo "Kompilacja zakoŇĄczona bŇāńôdem, ale brak skonfigurowanego webhooka w zakŇāadce Secrets."
          fi
